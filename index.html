<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈吴老师的信息课(●´ω｀●)ゞ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 在 <head> 中引入 Font Awesome 图标库 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #8e44ad;
            --pink: #ff6b9d;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #8e44ad, #ff6b9d);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- 导航栏 (保持原有样式) --- */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(142, 68, 173, 0.2);
            position: relative;
            z-index: 100;
        }
        .navbar h1 { 
            margin: 0; 
            color: var(--primary); 
            font-size: 1.5rem; 
        }
        .login-btn { 
            background: var(--primary); 
            color: white; 
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 10px 25px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
            text-decoration: none; 
            display: inline-block; 
        }
        .login-btn:hover { 
            background: #732d91; 
            transform: scale(1.05); 
        }

        /* --- 中间区域：星空与星球 --- */
        .main-space {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #star-canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 0; 
        }
        #galaxy { 
            position: relative; 
            z-index: 10; 
            width: 100%; 
            height: 100%; 
            padding: 80px; 
            box-sizing: border-box; 
        }

        /* --- 星球样式 --- */
        /* 移除了 .planet:hover 的 transform，改由 JS 控制悬停，防止动画冲突 */
        .planet {
            position: absolute;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            /* 默认大小，会被 JS 覆盖 */
            width: 80px;
            height: 80px;
            font-size: 1rem;
            /* 保持浮动动画 */
            animation: float 6s ease-in-out infinite;
            /* 关键：开启硬件加速，优化性能 */
            transform: translateZ(0);
        }

        /* 悬停效果：仅改变层级和光影，不改变位置 */
        .planet:hover {
            z-index: 100;
            box-shadow: 0 0 30px rgba(255,255,255,0.8);
            text-shadow: 0 0 10px white;
        }

        /* 配色 */
        .type-1 { background: radial-gradient(circle at 30% 30%, #cbe6ff, #78a6fc); }
        .type-2 { background: radial-gradient(circle at 30% 30%, #ee97ac, #ec5a8b); }
        .type-3 { background: radial-gradient(circle at 30% 30%, #ebcef7, #b162cc); }
        .type-4 { background: radial-gradient(circle at 30% 30%, #ffe9f2, #ffa3d0); }

        /* 浮动动画 */
        @keyframes float {
            0%, 100% { transform: translateY(0) translateZ(0); }
            50% { transform: translateY(-20px) translateZ(0); }
        }

        /* --- 页脚 (保持原有样式) --- */
        .footer { 
            width: 100%; 
            text-align: center; 
            padding: 20px 0; 
            background: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(2px); 
            color: rgba(255, 255, 255, 0.8); 
            font-size: 0.9rem; 
            position: relative; 
            z-index: 100; 
        }

/* --- 🎨 全新样式：点赞组件 (替换旧样式) --- */
/* 1. 容器：磨砂玻璃效果 + 悬浮定位 */
.like-container {
    /* 布局 */
    display: flex;
    align-items: center;
    gap: 12px;
    /* 磨砂玻璃背景 */
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(12px);
    padding: 10px 40px;
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    
    /* 💡 悬浮定位 (关键) */
    position: fixed;
    z-index: 1000; /* 确保在最顶层 */
    
    /* ✨ 动画过渡 (关键)：让位置变化平滑移动 */
    transition: top 1.5s cubic-bezier(0.2, 0.8, 0.7, 1.2), 
                left 1.5s cubic-bezier(0.2, 0.8, 0.7, 1.2);
    
    /* 防止被用户选中干扰点击 */
    user-select: none;
}

/* 2. 文字 */
.like-text {
    color: #ff6b9d;
    font-size: 1.25rem;
    font-weight: 500;
    text-shadow: 
        0 1px 10px rgba(255, 255, 255, 0.9),  /* 紧贴文字的亮白 */
        0 0 10px rgba(255, 255, 255, 0.6),   /* 扩散的光 */
        0 0 20px rgba(255, 100, 150, 0.3);   /* 最外层带一点点粉色光晕，显得更柔和高级 */
}

/* 3. 按钮基础样式 */
.like-btn {
    background: linear-gradient(145deg, #ff9a8b, #ff6a88); /* 渐变粉色背景 */
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    /* 阴影 */
    box-shadow: 0 4px 15px rgba(255, 106, 136, 0.4);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 2px solid rgba(255, 255, 255, 0.3);
}

/* 4. 按钮悬停效果 (鼠标放上去) */
.like-btn:hover {
    transform: scale(1.1) rotate(3deg); /* 稍微放大并旋转一点 */
    box-shadow: 0 6px 20px rgba(255, 106, 136, 0.6);
}

/* 5. 点赞图标样式 */
.like-btn i {
    font-size: 1.4rem;
    color: white;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    /* 启用硬件加速，让动画更流畅 */
    transform: translateZ(0);
}

/* 6. 数字样式 */
.like-count {
    color: #ff6b9d;
    font-weight: bold;
    font-size: 1.1rem;
    min-width: 30px;
    text-align: center;
    text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
}

/* --- ✨ 核心动效：点击心跳动画 --- */
/* 定义动画关键帧 */
@keyframes heartBeat {
    0% { transform: scale(1); }
    25% { transform: scale(1.3); } /* 放大 */
    50% { transform: scale(1); }   /* 回到原位 */
    75% { transform: scale(1.1); }  /* 再次微小放大 */
    100% { transform: scale(1); }
}

/* 定义动画类：当添加这个类时触发动画 */
.like-btn.animate {
    animation: heartBeat 0.4s cubic-bezier(0.215, 0.61, 0.355, 1) both;
}
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="navbar">
        <h1>🏫 吉华实验学校初中信息课积分榜 ✧*｡٩(ˊᗜˋ*)و✧*｡</h1>

<!-- 🔴 HTML 结构 (保持不变，但建议放在 body 内部靠前位置) -->
<div class="like-container">
    <span class="like-text">偷偷点个赞(｢･ω･)｢</span>
    <button class="like-btn" id="likeBtn" aria-label="点赞">
        <i class="fas fa-heart"></i>
    </button>
    <span class="like-count" id="likeCount">0</span>
</div>

        <a href="login.html" class="login-btn">🚀 进入控制台</a>
    </div>
    
    <!-- 中间区域 -->
    <div class="main-space">
        <canvas id="star-canvas"></canvas>
        <div id="galaxy">
            <!-- 星球将通过 JS 生成 -->
        </div>
    </div>
    
    <!-- 页脚 -->
    <div class="footer">
        &copy; 2026 吴湘鹏 —— 此网站由吴老师独立设计开发制作，保留所有权利 | 仅供个人教学使用，严禁外传或商用
    </div>

    <script>
        // --- 🌟 星空背景特效代码 (保持不变) ---
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        class Star {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1;
                const rand = Math.random();
                if (rand > 0.90) { this.type = 2; this.size = Math.random() * 3 + 4; }
                else if (rand > 0.6) { this.type = 1; this.size = Math.random() * 2 + 2; }
                else { this.type = 0; }
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.alpha = Math.random();
                this.alphaSpeed = Math.random() * 0.015 + 0.005;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < -10 || this.x > width + 10 || this.y < -10 || this.y > height + 10) { this.init(); }
                this.alpha += this.alphaSpeed;
                if (this.alpha <= 0.2 || this.alpha >= 1) { this.alphaSpeed = -this.alphaSpeed; }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = 'white';
                ctx.translate(this.x, this.y);
                if (this.type === 1) {
                    ctx.shadowBlur = 6; ctx.shadowColor = "white";
                    ctx.beginPath(); ctx.moveTo(0, -this.size * 3); ctx.lineTo(0, this.size * 3);
                    ctx.moveTo(-this.size * 3, 0); ctx.lineTo(this.size * 3, 0);
                    ctx.strokeStyle = 'white'; ctx.lineWidth = this.size / 2; ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2); ctx.fill();
                } else {
                    ctx.shadowBlur = this.type === 2 ? 15 : 8; ctx.shadowColor = "white";
                    ctx.beginPath(); ctx.arc(0, 0, this.size, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            }
        }
        function initStars() {
            stars = [];
            const starCount = 120;
            for (let i = 0; i < starCount; i++) { stars.push(new Star()); }
        }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => { star.update(); star.draw(); });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', resize);
        resize(); initStars(); animate();

        // --- 🚀 业务逻辑：生成均匀不重叠的星球 (修复版) ---
        const SUPABASE_URL = 'https://uhtdrmsznjvgkvshcsxh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RYMlvLaXEzLP0NtuJ_WIBg_pGpaOyQB';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.addEventListener('DOMContentLoaded', async () => {
            const galaxyEl = document.getElementById('galaxy');
            
            try {
                const { data, error } = await client
                    .from('students')
                    .select('class_name')
                    .limit(1000);
                if (error) throw error;

                const classIds = [...new Set(data.map(item => item.class_name))];
                const containerWidth = galaxyEl.clientWidth;
                const containerHeight = galaxyEl.clientHeight;

                // ✅ 参数配置
                const padding = 80; // 内边距
                const minPlanetSize = 60;
                const maxPlanetSize = 120;
                const safetyGap = 20; // 星球之间的最小安全距离

                // ✅ 网格系统：网格大小 = 最大星球直径 + 安全距离
                const cellSize = maxPlanetSize + safetyGap;
                const cols = Math.ceil(containerWidth / cellSize);
                const rows = Math.ceil(containerHeight / cellSize);

                // ✅ 初始化网格状态 (false = 空闲, true = 占用)
                const grid = Array(rows).fill(null).map(() => Array(cols).fill(false));

                // ✅ 放置星球函数
                function placePlanet(id, index) {
                    const maxAttempts = 500; // 最大尝试次数
                    let placed = false;

                    // 随机决定大小
                    const isBig = Math.random() > 0.7;
                    const size = isBig ? (Math.random() * 40 + 100) : (Math.random() * 30 + 60);
                    const radius = size / 2;
                    
                    // 计算该星球占据网格的半径
                    const occupiedCells = Math.ceil(size / cellSize);

                    for (let attempt = 0; attempt < maxAttempts && !placed; attempt++) {
                        // 1. 在可用区域内生成随机坐标
                        const availableWidth = containerWidth - padding * 2;
                        const availableHeight = containerHeight - padding * 2;
                        let x = Math.random() * availableWidth + padding;
                        let y = Math.random() * availableHeight + padding;

                        // 2. 计算所在的网格坐标
                        const col = Math.floor(x / cellSize);
                        const row = Math.floor(y / cellSize);

                        // 3. 边界检查 (防止数组越界)
                        if (col < 0 || col >= cols || row < 0 || row >= rows) {
                            continue;
                        }

                        // 4. 碰撞检测：检查周围格子
                        let collision = false;
                        for (let r = row - occupiedCells; r <= row + occupiedCells; r++) {
                            if (r < 0 || r >= rows) continue;
                            for (let c = col - occupiedCells; c <= col + occupiedCells; c++) {
                                if (c < 0 || c >= cols) continue;
                                if (grid[r][c]) {
                                    collision = true;
                                    break;
                                }
                            }
                            if (collision) break;
                        }

                        // 5. 如果没有碰撞，放置星球
                        if (!collision) {
                            const planet = document.createElement('div');
                            planet.className = `planet type-${(index % 4) + 1}`;
                            planet.innerText = `${id}班`;

                            // 设置样式
                            planet.style.width = `${size}px`;
                            planet.style.height = `${size}px`;
                            planet.style.fontSize = `${size / 4}px`;

                            // ⚠️ 修正：转换为百分比定位
                            planet.style.left = `${(x / containerWidth) * 100}%`;
                            planet.style.top = `${(y / containerHeight) * 100}%`;

                            // 动画设置
                            const duration = Math.random() * 4 + 4;
                            planet.style.animationDuration = `${duration}s`;
                            planet.style.animationDelay = `-${Math.random() * 5}s`;

                            // 点击事件
                            planet.onclick = () => {
                                window.location.href = `board.html?id=${id}&role=teacher&source=index`;
                            };

                            galaxyEl.appendChild(planet);

                            // 6. 标记网格为已占用
                            grid[row][col] = true;

                            placed = true;
                        }
                    }

                    if (!placed) {
                        console.warn(`星球 ${id}班 放置失败，空间可能已满。`);
                    }
                }

                // ✅ 批量生成
                classIds.forEach((id, index) => {
                    setTimeout(() => {
                        placePlanet(id, index);
                    }, 0);
                });

            } catch (err) {
                console.error('加载失败:', err);
                galaxyEl.innerHTML = '<div style="color:white; text-align:center; margin-top:50px;">📡 数据加载失败，请刷新重试</div>';
            }
        });

// --- 🚀 修复版：飞行模块逻辑 (请完全替换旧的飞行逻辑) ---
// 💡 将定时器变量声明在最外层，确保能被清除
let flyInterval;

// 等待 DOM 加载完成
document.addEventListener('DOMContentLoaded', () => {
    const likeContainer = document.querySelector('.like-container');
    const likeBtn = document.getElementById('likeBtn');
    const likeCountEl = document.getElementById('likeCount');

    // 1. 初始化位置
    function setInitialPosition() {
        likeContainer.style.right = '300px';
        likeContainer.style.left = 'auto';
        likeContainer.style.top = '5%';
        likeContainer.style.transition = 'none'; // 瞬间移动
    }
    setInitialPosition();

    // 2. 生成随机位置
    function getRandomPosition() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const elWidth = 180;
        const elHeight = 70;
        
        const maxX = w - elWidth - 20;
        const maxY = h - elHeight - 20;
        
        const randomX = Math.max(20, Math.floor(Math.random() * maxX));
        const randomY = Math.max(20, Math.floor(Math.random() * maxY));
        
        return { x: randomX, y: randomY };
    }

    // 3. 移动函数
    function flyToRandomPosition() {
        // 恢复过渡动画
        likeContainer.style.transition = 'top 2s cubic-bezier(0.2, 0.8, 0.7, 1.2), left 2s cubic-bezier(0.2, 0.8, 0.7, 1.2)';
        const pos = getRandomPosition();
        
        likeContainer.style.right = 'auto';
        likeContainer.style.left = `${pos.x}px`;
        likeContainer.style.top = `${pos.y}px`;
    }

    // 4. 启动自动飞行 (关键：使用全局变量)
    function startAutoFly() {
        // ⚠️ 关键修复：先强制清除可能存在的任何旧定时器
        if (flyInterval) {
            clearInterval(flyInterval);
            flyInterval = null;
        }

        // 设置新的定时器
        flyInterval = setInterval(flyToRandomPosition, 2000 + Math.random() * 2000);
    }

    // --- 🔧 点赞功能逻辑 ---
    // 1. 读取点赞数 (保持不变)
    async function loadLikeCount() {
        try {
            const { data, error } = await client
                .from('config_db')
                .select('data')
                .eq('type', 'like_count')
                .single();
            if (error) {
                if (error.code === 'PGRST116') {
                    likeCountEl.textContent = '0';
                    return;
                }
                throw error;
            }
            let count = 0;
            if (data && data.data !== null) {
                count = parseInt(data.data) || 0;
            }
            likeCountEl.textContent = count;
        } catch (err) {
            console.error('加载失败:', err);
            likeCountEl.textContent = '0';
        }
    }

    // 2. 点击事件
    likeBtn.addEventListener('click', async () => {
        // ✨ 核心修复：确保清除定时器
        if (flyInterval) {
            clearInterval(flyInterval);
        }

        const current = parseInt(likeCountEl.textContent);
        likeCountEl.textContent = current + 1;

        // 触发动效
        likeBtn.classList.remove('animate');
        void likeBtn.offsetWidth; // 触发重排
        likeBtn.classList.add('animate');

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_like_count`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})
            });

            if (!response.ok) throw new Error('Network error');
            const result = await response.json();
            
            if (typeof result === 'number') {
                likeCountEl.textContent = result;
            }
        } catch (err) {
            console.error('点赞失败:', err);
            likeCountEl.textContent = current;
        }

        // 5秒后恢复自动飞行
        setTimeout(() => {
            // 恢复时，先清除一次，再重新开始，防止叠加
            if (flyInterval) clearInterval(flyInterval);
            startAutoFly();
        }, 1000);
    });

    // --- 🚀 初始化 ---
    loadLikeCount(); 
    startAutoFly(); // 启动飞行
});

// 初始化加载
loadLikeCount();
    </script>
</body>
</html>
