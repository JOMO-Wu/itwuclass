<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 多巴胺积分系统</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #8e44ad, #ff6b9d); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 350px; animation: popIn 0.4s ease; }
        .login-card h2 { color: #8e44ad; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; color: #666; margin-bottom: 5px; font-size: 14px; }
        .input-group input { width: 90%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; }
        .input-group input:focus { border-color: #ff6b9d; }
        .role-select { display: flex; gap: 10px; margin-bottom: 20px; }
        .role-btn { flex: 1; padding: 10px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; color: #666; }
        .role-btn.active { border-color: #8e44ad; background: #fdf2f8; color: #8e44ad; }
        .login-btn { width: 100%; padding: 15px; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; background: #8e44ad; color: white; }
        .login-btn:hover { transform: scale(1.02); background: #732d91; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🏫 欢迎登录</h2>
        
        <div class="role-select">
            <div class="role-btn active" onclick="setRole('teacher')">我是教师</div>
            <div class="role-btn" onclick="setRole('student')">我是学生</div>
        </div>

        <div class="input-group">
            <label>账号 (教师admin / 学生填学号)</label>
            <input type="text" id="username" placeholder="请输入账号">
        </div>
        <div class="input-group">
            <label>密码 (默认123456)</label>
            <input type="password" id="password" value="123456">
        </div>

        <button class="login-btn" onclick="handleLogin()">登 录</button>
    </div>

    <script>
        let currentRole = 'teacher';

        function setRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('username').value = '';
        }

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if (currentRole === 'teacher') {
                if (u === 'admin' && p === '123456') {
                    window.location.href = 'teacher.html';
                } else {
                    alert('教师账号或密码错误！');
                }
            } else {
                // 学生登录逻辑
                if (!u) return alert('请输入学号！');
                
                // 验证学号是否存在
                const db = JSON.parse(localStorage.getItem('scoreSystemDB'));
                let targetClassId = '';
                let studentExists = false;

                if(db && db.classes) {
                    for(let cls of db.classes) {
                        if(cls.students.find(s => s.id === u)) {
                            targetClassId = cls.id;
                            studentExists = true;
                            break;
                        }
                    }
                }

                if (studentExists && p === '123456') {
                    // 修复点：在 URL 中增加 user 参数，传递学号
                    window.location.href = `class.html?id=${targetClassId}&role=student&user=${u}`;
                } else {
                    alert('学号不存在或密码错误！');
                }
            }
        }
    </script>
</body>
</html>
