<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级排行榜🏆</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #8e44ad;
            --pink: #ff6b9d;
            --bg: #fdf2f8;
            --card-bg: #ffffff;
            --text: #2d3436;
            --border: #f1f2f6;
            --gold: #FFD700;
            --silver: #C0C0C2;
            --bronze: #CD7F32;
            /* 身份标签颜色变量 */
            --tag-leader-bg: #fff3e0; --tag-leader-text: #ef6c00; /* 组长-橙色 */
            --tag-rep-bg: #e3f2fd; --tag-rep-text: #1565c0;       /* 课代表-蓝色 */
            --tag-default-bg: #f3e5f5; --tag-default-text: #8e44ad; /* 默认-紫色 */
            --tag-rep-text: #1565c0; /* 深蓝色文字 */
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar { 
            background: var(--card-bg); 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 15px rgba(142, 68, 173, 0.1); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .navbar h1 { 
            margin: 0; 
            color: var(--primary); 
            font-size: 1.5rem; 
        }
        .back-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        .back-btn:hover { 
            background: #732d91; 
            transform: scale(1.05); 
        }

        /* 布局：左中右三列 */
        .container {
            max-width: 1600px; 
            margin: 20px auto;
            padding: 0 20px;
            flex: 1;
            display: grid;
            grid-template-columns: 3fr 2fr 1fr; 
            gap: 20px;
        }

        /* 通用卡片样式 */
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(142, 68, 173, 0.1);
            overflow-y: auto;
            max-height: 85vh;
        }

        .card h2 {
            color: var(--primary);
            margin-top: 0;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            z-index: 10;
        }

        /* 左侧表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background-color: #f8f9fa;
            color: var(--primary);
            font-weight: bold;
        }
        tr:hover {
            background-color: #f1f2f6;
        }

        /* --- 修改点：同步 Class 页面的身份 Badge 样式 --- */
        /* 身份标签样式 (与 Class 页面保持一致) */
        .identity-tag {
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.8rem; /* 与 Class 保持一致 */
            font-weight: bold;
            color: white;
            /* 背景色由 JS 动态注入 */
        }
        /* 链接样式 (保持与左侧一致) */
        .stu-link {
            color: var(--text);
            text-decoration: none;
            font-weight: bold;
        }
        .stu-link:hover {
            color: var(--pink);
        }

        /* 排行榜横条样式 */
        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }
        .leaderboard-item:last-child {
            border-bottom: none;
        }
        .rank {
            width: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-right: 10px;
        }
        .rank-1 { color: var(--gold); }
        .rank-2 { color: var(--silver); }
        .rank-3 { color: var(--bronze); }
        
        /* 名字/组名区域 */
        .item-name {
            flex: 1;
            font-weight: 500;
            color: #444;
        }
        
        /* 分数区域 - 关键修改点：添加 margin-left: auto 实现居右 */
        .item-score {
            font-weight: bold;
            color: var(--primary);
            font-size: 1.1rem;
            margin-left: auto; /* 核心代码：将分数推到最右边 */
        }

        .footer {
            width: 100%;
            text-align: center;
            padding: 15px 0;
            border-top: 1px solid #eee;
            color: #888;
            font-size: 0.8rem;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="navbar">
        <h1 id="page-title">班级看板</h1>
        <button class="back-btn" onclick="goBack()">← 返回首页</button>
    </div>

    <!-- 主内容区 -->
    <div class="container">
        <!-- 左侧：学生表格 -->
        <div class="card">
            <h2>📋 学生名单</h2>
            <div id="loading">加载中...</div>
            <div id="table-container" style="display: none;">
                <table id="students-table">
                    <thead>
                        <tr>
                            <th>座位</th>
                            <th>姓名</th>
                            <th>身份</th>
                            <th>小组</th>
                            <th>当前积分</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 数据将由 JS 注入 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 中间：个人积分排行榜 -->
        <div class="card">
            <h2>🏆 个人排行榜(　ﾟ∀ﾟ) ﾉ♡</h2>
            <div id="leaderboard-list">
                <!-- 数据将由 JS 注入 -->
            </div>
        </div>

        <!-- 右侧：小组排行榜 -->
        <div class="card">
            <h2>🏅 小组总分榜</h2>
            <div id="group-leaderboard-list">
                <!-- 数据将由 JS 注入 -->
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 吴湘鹏 —— 此网站由吴老师独立设计开发制作，保留所有权利 | 仅供个人教学使用，严禁外传或商用
    </div>

    <script>
        // 1. 初始化 Supabase
        const SUPABASE_URL = 'https://uhtdrmsznjvgkvshcsxh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RYMlvLaXEzLP0NtuJ_WIBg_pGpaOyQB';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. 获取 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        const classId = urlParams.get('id');
        const source = urlParams.get('source') || 'index';

        // 3. 页面加载逻辑
        window.addEventListener('DOMContentLoaded', () => {
            if (!classId) {
                document.getElementById('loading').innerText = '错误：未指定班级ID';
                return;
            }
            document.getElementById('page-title').innerText = `${classId}班 排行榜(✪ω✪)`;
            loadClassData();
        });

        // 辅助函数：根据身份文字返回对应的 CSS 类名
        function getIdentityClass(identity) {
            if (!identity) return 'tag-default';
            if (identity.includes('组长')) return 'tag-leader';
            if (identity.includes('课代表')) return 'tag-rep';
            return 'tag-default';
        }

        // 4. 加载班级数据
        async function loadClassData() {
            const loadingEl = document.getElementById('loading');
            const tableContainer = document.getElementById('table-container');
            const tbody = document.querySelector('#students-table tbody');
            const leaderboardContainer = document.getElementById('leaderboard-list');
            const groupLeaderboardEl = document.getElementById('group-leaderboard-list');

            try {
                loadingEl.style.display = 'block';
                tableContainer.style.display = 'none';
// --- 新增代码：强制从 LocalStorage 获取最新配置 ---
        // 因为 board.html 可能不是从 teacher.html 直接跳转的，所以 window.scoreSystemDB 可能不存在
        // 我们必须手动读取 localStorage 中 teacher.html 保存的最新数据
        const savedDB = localStorage.getItem('scoreSystemDB');
        let localDB = { identities: [] };
        
        if (savedDB) {
            try {
                localDB = JSON.parse(savedDB);
                // 确保 window.scoreSystemDB 也是最新的，供其他地方使用
                window.scoreSystemDB = localDB; 
            } catch (e) {
                console.error('解析本地配置失败', e);
            }
        }
        // --- 新增代码结束 ---
                // 查询数据
                const { data, error } = await client
                    .from('students')
                    .select('*')
                    .eq('class_name', classId);

                if (error) throw error;

                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;">暂无学生数据</td></tr>';
                    leaderboardContainer.innerHTML = '<div style="color:#999; padding:20px;">暂无排名数据</div>';
                    groupLeaderboardEl.innerHTML = '<div style="color:#999; padding:20px;">暂无小组数据</div>';
                } else {
            // 4.1 渲染左侧表格：按座位号升序排序
            // 4.1 渲染左侧表格：按座位号升序排序
            const sortedBySeat = [...data].sort((a, b) => {
                if (!a.seat && !b.seat) return 0;
                if (!a.seat) return 1;
                if (!b.seat) return -1;
                return a.seat - b.seat;
            });

            tbody.innerHTML = '';
            sortedBySeat.forEach(student => {
                const tr = document.createElement('tr');
                
                // --- 核心修改：同步 Class.html 的身份颜色逻辑 ---
                // 这里的逻辑与 class.html 中的 renderTable 完全一致
                // 1. 尝试从 window.scoreSystemDB (即后台配置) 获取颜色
                // 2. 如果没有配置，使用默认颜色
                const identityConfig = (window.scoreSystemDB?.identities || [])
                    .find(i => i.name === student.identity) || { 
                        name: student.identity || '平民', 
                        color: '#b2bec3' // 默认灰色，与 Class 页面默认值一致
                    };

                tr.innerHTML = `
                    <td>${student.seat || '未排'}</td> 
                    <td><a href="student.html?id=${student.id}" class="stu-link">${student.name}</a></td>
                    
                    <!-- 修改点：使用同步的 Badge 样式 -->
                    <td>
                        <span class="identity-tag" style="background-color: ${identityConfig.color};">
                            ${student.identity || '平民'}
                        </span>
                    </td>
                    
                    <td>${student.group || '-'}</td>
                    <td><strong style="color: var(--primary); font-size: 1.1rem;">${student.score}</strong></td>
                `;
                tbody.appendChild(tr);
            });

                    // 4.2 渲染中间：个人排行榜
                    const rankedStudents = data
                        .filter(student => student.score != 0)
                        .sort((a, b) => b.score - a.score); 

                    leaderboardContainer.innerHTML = '';
                    if (rankedStudents.length === 0) {
                        leaderboardContainer.innerHTML = '<div style="color:#999; padding:20px; text-align:center;">暂无积分记录</div>';
                    } else {
                        rankedStudents.forEach((student, index) => {
                            const rank = index + 1;
                            const rankClass = rank <= 3 ? `rank rank-${rank}` : 'rank';
                            
                            const item = document.createElement('div');
                            item.className = 'leaderboard-item';
                            
                            // 修改点：姓名保持链接样式，分数使用 .item-score 类（已设置 margin-left: auto）
                            item.innerHTML = `
                                <span class="${rankClass}">${rank}</span>
                                <!-- 姓名链接 -->
                                <a href="student.html?id=${student.id}" class="stu-link">${student.name}</a>
                                <!-- 分数：已自动居右 -->
                                <span class="item-score">${student.score}分</span>
                            `;
                            leaderboardContainer.appendChild(item);
                        });
                    }

                    // 4.3 渲染右侧：小组排行榜
                    const groupScores = {};
                    data.forEach(student => {
                        const groupName = student.group || '未分组';
                        if (!groupScores[groupName]) {
                            groupScores[groupName] = 0;
                        }
                        groupScores[groupName] += student.score;
                    });

                    const sortedGroups = Object.entries(groupScores)
                        .map(([name, total]) => ({ name, total }))
                        .sort((a, b) => b.total - a.total);

                    groupLeaderboardEl.innerHTML = '';
                    if (sortedGroups.length === 0) {
                        groupLeaderboardEl.innerHTML = '<div style="color:#999; padding:20px; text-align:center;">暂无小组数据</div>';
                    } else {
                        sortedGroups.forEach((group, index) => {
                            const rank = index + 1;
                            const rankClass = rank <= 3 ? `rank rank-${rank}` : 'rank';
                            const item = document.createElement('div');
                            item.className = 'leaderboard-item';
                            item.innerHTML = `
                                <span class="${rankClass}">${rank}</span>
                                <span class="item-name">${group.name}</span>
                                <span class="item-score">${group.total}分</span>
                            `;
                            groupLeaderboardEl.appendChild(item);
                        });
                    }
                }

                loadingEl.style.display = 'none';
                tableContainer.style.display = 'block';

            } catch (err) {
                console.error('加载失败:', err);
                loadingEl.innerText = '加载失败：' + err.message;
            }
        }

        // 5. 返回逻辑
        function goBack() {
            if (source === 'index') {
                window.location.href = 'index.html';
            } else {
                window.history.back();
            }
        }
    </script>
</body>
</html>
